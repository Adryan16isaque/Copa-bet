<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolão da Copa</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Bolão da Copa</h1>

  <div class="form-group">
    <label for="usuario">Nome do Usuário:</label>
    <input type="text" id="usuario" placeholder="Digite seu nome" onkeyup="checkDuplicateUser()">
    <div id="userWarning" class="duplicate-warning"></div>
  </div>

  <div class="form-group">
    <label for="jogo">ID do Jogo:</label>
    <input type="number" id="jogo" placeholder="Ex: 1">
  </div>

  <div class="form-group">
    <label for="tipoAposta">Tipo de Aposta:</label>
    <select id="tipoAposta">
      <option value="duplo">Aposta Dupla (Time A x Time B)</option>
      <option value="empate">Aposta em Empate</option>
    </select>
  </div>

  <div class="form-group" id="palpiteGroup">
    <label for="palpiteA">Gols do Time A:</label>
    <input type="number" id="palpiteA" placeholder="Ex: 2">
    <label for="palpiteB">Gols do Time B:</label>
    <input type="number" id="palpiteB" placeholder="Ex: 1">
  </div>

  <button onclick="fazerAposta()">Fazer Aposta</button>

  <div id="resultado"></div>

  <div id="listaApostas">
    <h2>Lista de Apostas</h2>
    <div id="apostasList"></div>
  </div>

  <div id="adminSection">
    <h2>Área do Administrador</h2>
    <div class="form-group">
      <label for="adminJogo">ID do Jogo para Registrar Resultado:</label>
      <input type="number" id="adminJogo" placeholder="Ex: 1">
    </div>
    <div class="form-group">
      <label for="adminGolsA">Gols do Time A:</label>
      <input type="number" id="adminGolsA" placeholder="Ex: 2">
    </div>
    <div class="form-group">
      <label for="adminGolsB">Gols do Time B:</label>
      <input type="number" id="adminGolsB" placeholder="Ex: 1">
    </div>
    <button onclick="registrarResultado()">Registrar Resultado</button>
  </div>

  <div id="ranking">
    <h2>Ranking</h2>
    <div id="rankingList"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
